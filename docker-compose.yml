services:
  postgres:
    image: postgres:18
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-changeme}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 3s
      retries: 10

  redis:
    image: redis:8
    command: redis-server --requirepass ${REDIS_PASS:-changeme}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 3s
      retries: 10

  neo4j:
    image: neo4j:2026.02.2
    environment:
      NEO4J_AUTH: ${NEO4J_USERNAME:-neo4j}/${NEO4J_PASSWORD:-changeme}
    ports:
      # http://localhost:7474/browser/
      - '${NEO4J_HTTP_PORT:-7474}:7474'
      - '${NEO4J_BOLT_PORT:-7687}:7687'
    volumes:
      - neo4j:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'wget', '-O', '/dev/null', '-q', 'http://localhost:7474']
      interval: 5s
      timeout: 3s
      retries: 10

  app:
    build: .
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - APP_SESSION_SECRET=${APP_SESSION_SECRET:-super_secret_value}
      - APP_SESSION_EXPIRY_HOURS=${APP_SESSION_EXPIRY_HOURS:-336}
      - PLATFORM_MODEL_ENABLED=${PLATFORM_MODEL_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PLATFORM_MODEL=${LLM_PLATFORM_MODEL:-gemini-2.5-flash}
      - NEO4J_URI=${NEO4J_URI}
      - NEO4J_USERNAME=${NEO4J_USERNAME:-neo4j}
      - NEO4J_PASSWORD=${NEO4J_PASSWORD:-changeme}
    ports:
      - '${APP_PORT:-3333}:3333'
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      neo4j:
        condition: service_healthy
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  postgres:
  redis:
  neo4j:
