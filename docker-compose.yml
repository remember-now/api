services:
  postgres:
    image: pgvector/pgvector:pg17
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASS:-changeme}
      PGDATA: /data/postgres
    volumes:
      - postgres:/data/postgres
    ports:
      - '${POSTGRES_PORT:-5432}:5432'
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U ${POSTGRES_USER:-postgres}']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:8
    command: redis-server --requirepass ${REDIS_PASS:-changeme}
    ports:
      - '${REDIS_PORT:-6379}:6379'
    volumes:
      - redis:/data
    networks:
      - app
    restart: unless-stopped
    healthcheck:
      test: ['CMD', 'redis-cli', '--raw', 'incr', 'ping']
      interval: 5s
      timeout: 3s
      retries: 5

  app:
    build: .
    environment:
      - POSTGRES_URL=${POSTGRES_URL}
      - APP_FRONTEND_URL=${APP_FRONTEND_URL}
      - REDIS_URL=redis://:${REDIS_PASS}@redis:6379
      - APP_SESSION_SECRET=${APP_SESSION_SECRET:-super_secret_value}
      - APP_SESSION_EXPIRY_HOURS=${APP_SESSION_EXPIRY_HOURS:-336}
      - PLATFORM_MODEL_ENABLED=${PLATFORM_MODEL_ENABLED:-false}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - LLM_PLATFORM_MODEL=${LLM_PLATFORM_MODEL:-gemini-2.5-flash}
    ports:
      - '${APP_PORT:-3333}:3333'
    networks:
      - app
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    restart: unless-stopped

networks:
  app:
    driver: bridge

volumes:
  postgres:
  redis:
